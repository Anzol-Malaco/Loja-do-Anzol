{% extends "base.html" %}

{% block title %}Falha no Pagamento - CNC Imports{% endblock %}

{% block content %}
<div class="sucesso-container" style="text-align: center; padding: 60px 20px; max-width: 600px; margin: 0 auto;">
    
    <div class="sucesso-icon" style="font-size: 5rem; color: #e74c3c; margin-bottom: 20px;">
        <i class="fas fa-times-circle"></i>
    </div>

    <h1 style="color: #2c3e50; margin-bottom: 10px;">Falha no Pagamento</h1>
    <p style="font-size: 1.1rem; color: #7f8c8d; margin-bottom: 30px;">
        Não foi possível processar seu pagamento. Você pode tentar novamente ou escolher outra forma de pagamento.
    </p>

    <div class="acoes-sucesso" style="display: flex; flex-direction: column; gap: 15px;">
        <a href="{{ url_for('carrinho') }}" class="btn-buy" style="text-decoration: none; padding: 15px;">
            <i class="fas fa-shopping-cart"></i> Voltar ao Carrinho
        </a>
        
        <a href="{{ url_for('home') }}" style="color: #3498db; text-decoration: none; font-weight: 600;">
            <i class="fas fa-home"></i> Ir para o Início
        </a>
    </div>
</div>
{% endblock %}
