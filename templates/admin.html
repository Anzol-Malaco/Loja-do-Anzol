<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Admin - CNC Imports</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .admin-container { max-width: 500px; margin: 50px auto; padding: 30px; background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #e67e22; }
        input[type="number"], input[type="file"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .btn-update { width: 100%; background: #e67e22; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .btn-update:hover { background: #d35400; }
    </style>
</head>
<body style="background: #f4f4f4;">
    <div class="admin-container">
        <h2 style="text-align: center; color: #e67e22;">Painel de Controle</h2>
        <p style="text-align: center; font-size: 0.9rem; color: #666;">CNC Imports - Atualização de Preços</p>
        <hr>

        <form id="formAdmin">
            <div class="form-group">
                <label>Margem de Lucro (%)</label>
                <input type="number" name="margem" id="margem" value="15" placeholder="Ex: 15">
            </div>

            <div class="form-group">
                <label>Planilha de Preços (.xlsx)</label>
                <input type="file" name="planilha" id="planilha" accept=".xlsx">
            </div>

            <button type="submit" class="btn-update">ATUALIZAR PREÇOS</button>
        </form>

        <div id="status" style="margin-top: 20px; text-align: center; font-weight: bold;"></div>
    </div>

    <script>
        document.getElementById('formAdmin').onsubmit = async (e) => {
            e.preventDefault();
            const status = document.getElementById('status');
            status.innerText = "Processando...";

            const formData = new FormData(e.target);
            const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');

            const res = await fetch('/api/admin/atualizar-precos', {
                method: 'POST',
                headers: {
                    'X-CSRFToken': csrfToken
                },
                body: formData
            });

            const data = await res.json();
            if(res.ok) {
                status.style.color = "green";
                status.innerText = data.sucesso;
            } else {
                status.style.color = "red";
                status.innerText = "Erro: " + data.erro;
            }
        };
    </script>
</body>
</html>
